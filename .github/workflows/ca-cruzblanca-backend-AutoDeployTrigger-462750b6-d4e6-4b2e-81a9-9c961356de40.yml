name: Trigger auto deployment for ca-cruzblanca-backend

on:
  push:
    branches: 
      [ main ]
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write 
      contents: read 

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v4 # Actualizado a v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CACRUZBLANCABACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CACRUZBLANCABACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CACRUZBLANCABACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: './Dockerfile' # Nombre correcto
          registryUrl: '' # Déjalo vacío si no usas registro externo privado
          registryUsername: ${{ secrets.CACRUZBLANCABACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CACRUZBLANCABACKEND_REGISTRY_PASSWORD }}
          containerAppName: ca-cruzblanca-backend
          resourceGroup: rg-ocr-cruzblanca
          imageToBuild: ca-cruzblanca-backend:${{ github.sha }} # Simplificado
